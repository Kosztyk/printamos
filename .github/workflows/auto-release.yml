name: 🤖 Auto Publish Draft Release

on:
  schedule:
    - cron: "0 12 * * 2" # Tuesdays at 12 PM UTC
  workflow_dispatch:

jobs:
  publish-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Find and publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the latest draft release tag
          DRAFT_TAG=$(gh release list --limit 100 --json tagName,isDraft --jq '.[] | select(.isDraft == true) | .tagName' | head -n 1)
          
          if [ -z "$DRAFT_TAG" ]; then
            echo "No draft releases found"
            exit 0
          fi
          
          echo "Found draft release: $DRAFT_TAG"
          
          # Create and push the tag
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          
          # Publish the draft release
          gh release edit "$DRAFT_TAG" --draft=false
          echo "Published draft release: $DRAFT_TAG"
