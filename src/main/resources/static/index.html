<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Printamos</title>

    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .option-badge {
            margin-right: .5rem;
        }

        .spinner-grow-sm {
            width: 1rem;
            height: 1rem;
        }

        #statusBox {
            word-wrap: break-word;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <div class="container py-4">
        <div class="row justify-content-center">

            <!-- Manage Printers -->
            <div class="col-12 col-md-10 col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h1 class="h4 mb-3">Manage Printers</h1>

                        <!-- Add printer -->
                        <form id="addPrinterForm" class="mb-3 needs-validation" novalidate>
                            <h6>Add Printer</h6>
                            <div class="mb-2">
                                <label for="addPrinterName">Printer Name</label>
                                <input id="addPrinterName" name="printer_name" type="text" class="form-control" required
                                    placeholder="Printer name" pattern="^[a-zA-Z0-9_\-]{1,128}$">
                            </div>
                            <div class="mb-2">
                                <label for="addPrinterUri">Printer Uri</label>
                                <input id="addPrinterUri" name="printer_uri" type="text" class="form-control" required
                                    placeholder="Printer URI (e.g. ipp://192.168.1.100/ipp/print)">
                            </div>
                            <div class="mb-2">
                                <label for="addPrinterModel">Printer Model</label>
                                <input id="addPrinterModel" name="printer_model" type="text" class="form-control"
                                    placeholder="Model/PPD (optional, e.g. everywhere)">
                            </div>
                            <button type="submit" id="addPrinterBtn" class="btn btn-success btn-sm">Add Printer</button>
                        </form>

                        <div id="printerStatusBox" class="p-3 border rounded bg-dark-subtle small mb-3">
                            <strong>Status:</strong> <span id="printerStatusMessage">Idle</span>
                        </div>

                        <!-- Printers list -->
                        <div>
                            <h6>Available Printers</h6>
                            <ul id="printersList" class="list-group small"></ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Upload & Print -->
            <div class="col-12 col-md-10 col-lg-8 mt-4 mt-md-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h1 class="h4 mb-3">Upload & Print</h1>

                        <form id="printForm" class="needs-validation" novalidate>

                            <div class="mb-3">
                                <label for="printerSelect" class="form-label">Select Printer</label>
                                <select id="printerSelect" name="printer_name" required class="form-select">
                                    <option value="" selected disabled>Loading printers...</option>
                                </select>
                                <div class="invalid-feedback">Please select a printer.</div>
                            </div>

                            <div class="mb-3">
                                <label for="fileInput" class="form-label">File to print</label>
                                <input id="fileInput" name="file" type="file" required class="form-control"
                                    accept=".pdf,.jpg,.jpeg" />
                                <div class="form-text">Accepted: .pdf, .jpg, .jpeg</div>
                                <div class="invalid-feedback">Please supply a PDF or JPG file.</div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-12 col-sm-4">
                                    <label for="copies" class="form-label">Copies</label>
                                    <input id="copies" name="copies" type="number" class="form-control" min="1"
                                        value="1" required />
                                    <div class="invalid-feedback">Enter a number ≥ 1.</div>
                                </div>

                                <div class="col-12 col-sm-8">
                                    <label class="form-label">Printer options (optional)</label>
                                    <div class="input-group mb-2">
                                        <label for="optionInput">Options</label>
                                        <input id="optionInput" class="form-control"
                                            placeholder="e.g. sides=two-sided-long-edge" />
                                        <button type="button" id="addOptionBtn" class="btn btn-outline-primary">Add
                                        </button>
                                    </div>

                                    <div id="optionsList" class="d-flex flex-wrap gap-2"></div>
                                    <div class="form-text">Examples: <code>sides=two-sided-long-edge</code>,
                                        <code>media=A4</code>, <code>print-quality=3</code>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex align-items-center gap-2">
                                <button id="submitBtn" type="submit" class="btn btn-primary">
                                    <span id="submitSpinner" class="spinner-grow spinner-grow-sm visually-hidden"
                                        role="status" aria-hidden="true"></span>
                                    <span id="submitText">Send to Printer</span>
                                </button>
                                <button id="resetBtn" type="button" class="btn btn-outline-secondary">Reset</button>
                                <div id="statusBadge" class="ms-auto"></div>
                            </div>
                        </form>

                        <div id="statusBox" class="mt-1 p-1 border rounded" aria-live="polite">
                            <strong>Status:</strong> <span id="statusMessage">Idle</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom script -->
    <script src="print-job.js"></script>
    <script src="printers.js"></script>
</body>

</html>
